blueprint:
  name: 🪫 Отчет по состоянию батарей (v3.11.0 Parallel HTML Edition)
  description: |
    Создает два кратких отчета (с разделением на "Замена" и "Зарядка") по устройствам, заряд которых ниже критического уровня.
    Отправляет отчеты на мобильное устройство, в Telegram, VK Notify (Keyboard Edition) и/или Max в заданное время.

    **v3.11.0:** Max Notify и VK Notify переведены на нативные службы с поддержкой HTML и выделенных заголовков.
    Отправка во все мессенджеры теперь выполняется параллельно — ошибка в одном не блокирует остальные!

    **Важное требование!** Для работы автоматизации необходимо предварительно установить и настроить интеграцию **HA-Battery Notes**.
  domain: automation
  source_url: https://raw.githubusercontent.com/Eugen417/homeassistant-blueprints/refs/heads/main/Battery_Report_V3.4_RU.yaml

  input:
    # 1. ТРИГГЕРЫ
    trigger_time:
      name: ⏰ Время запуска
      description: Время ежедневной проверки (например, 08:00:00).
      selector:
        time:
    trigger_days:
      name: 🗓️ Дни недели для проверки (КРАТКИЙ ОТЧЕТ)
      description: Выберите дни, когда должен запускаться КРАТКИЙ отчет. Если пусто — каждый день.
      default: []
      selector:
        select:
          multiple: true
          options:
            - label: Понедельник
              value: Mon
            - label: Вторник
              value: Tue
            - label: Среда
              value: Wed
            - label: Четверг
              value: Thu
            - label: Пятница
              value: Fri
            - label: Суббота
              value: Sat
            - label: Воскресенье
              value: Sun

    # 2. УСТРОЙСТВА И ПОРОГИ
    mobile_notify_target:
      name: 📱 Мобильное устройство (Приложение Home Assistant)
      description: Выберите ОДНО устройство для push-уведомлений.
      default: ""
      selector:
        device:
          integration: mobile_app

    telegram_notify_target:
      name: 💬 Уведомления Telegram
      description: Выберите сущности вашего сервиса Telegram (notify.telegram_bot_...).
      default:
        entity_id: []
      selector:
        target:
          entity:
            - domain: notify

    vk_notify_target:
      name: "💬 Уведомления VK Notify"
      description: "Выберите сущности VK Notify. Отправка будет с поддержкой HTML."
      default:
        entity_id: []
      selector:
        target:
          entity:
            - domain: notify

    max_notify_target:
      name: "💬 Уведомления Max Notify"
      description: "Выберите сущности Max Notify. Отправка в формате HTML."
      default:
        entity_id: []
      selector:
        target:
          entity:
            - domain: notify

    send_full_report_option:
      name: 📊 Отправлять Полный отчет вторым сообщением?
      description: Включите для получения полного списка всех батарей во все выбранные мессенджеры.
      default: false
      selector:
        boolean:

    full_report_days:
      name: 📅 Дни недели для ПОЛНОГО ОТЧЕТА
      description: Выберите дни для полного отчета. Если пусто — каждый день (при включенной опции).
      default: []
      selector:
        select:
          multiple: true
          options:
            - label: Понедельник
              value: Mon
            - label: Вторник
              value: Tue
            - label: Среда
              value: Wed
            - label: Четверг
              value: Thu
            - label: Пятница
              value: Fri
            - label: Суббота
              value: Sat
            - label: Воскресенье
              value: Sun

    critical_level:
      name: ⚠️ Критический уровень (%)
      description: Уровень заряда, ниже которого устройство помечается как требующее внимания.
      default: 15
      selector:
        number:
          min: 1
          max: 99
          step: 1
          unit_of_measurement: "%"
          mode: box

    excluded_sensors:
      name: 🗑️ Исключаемые сенсоры
      description: Сенсоры уровня заряда, которые нужно исключить из отчета.
      default:
        entity_id: []
      selector:
        target:
          entity:
            - domain: sensor
              device_class: battery

    # 3. НАСТРОЙКА ТЕКСТА И ФРАЗ
    text_disposable_header:
      name: 📝 Заголовок (Краткий отчет - ЗАМЕНА)
      default: "⚠️ <b>Устройства, требующие замены батареи:</b>\n"
      selector:
        text:
    text_disposable_action:
      name: 📝 Шаблон строки (Краткий отчет - ЗАМЕНА)
      default: "<b>%LEVEL%%</b> ♻️ ЗАМЕНА! (Тип: %TYPE%, Кол-во: %QTY%)"
      selector:
        text:
    text_disposable_ok:
      name: 📝 Сообщение (ЗАМЕНА не требуется)
      default: "Все незаряжаемые батареи имеют заряд выше "
      selector:
        text:
    text_rechargeable_header:
      name: 📝 Заголовок (Краткий отчет - ЗАРЯДКА)
      default: "⚠️ <b>Устройства, требующие подзарядки:</b>\n"
      selector:
        text:
    text_rechargeable_action:
      name: 📝 Шаблон строки (Краткий отчет - ЗАРЯДКА)
      default: "<b>%LEVEL%%</b> 🔌 ЗАРЯДКА!"
      selector:
        text:
    text_rechargeable_ok:
      name: 📝 Сообщение (ЗАРЯДКА не требуется)
      default: "Все заряжаемые устройства имеют заряд выше "
      selector:
        text:
    text_full_replace_label:
      name: 📝 Метка замены (Полный отчет)
      default: " ♻️ <b>ЗАМЕНА!</b>"
      selector:
        text:
    text_full_charge_label:
      name: 📝 Метка зарядки (Полный отчет)
      default: " 🔌 <b>ЗАРЯДКА!</b>"
      selector:
        text:
    text_rechargeable_type:
      name: 📝 Название встроенного АКБ
      default: "Встроенный АКБ"
      selector:
        text:
    text_unknown_type:
      name: 📝 Название неизвестного типа
      default: "Неизвестный Тип"
      selector:
        text:
    text_summary_header:
      name: 📝 Заголовок сводки
      default: "--- \n\n🔋 <b>Сводка по Типу Батареи:</b>\n"
      selector:
        text:
    text_grand_total:
      name: 📝 Шаблон общего количества
      description: Используйте HTML теги (b, i).
      default: "<i>Общее количество контролируемых элементов:</i> <b>%TOTAL%</b> шт."
      selector:
        text:
    text_offline_header:
      name: 📝 Заголовок (Недоступные устройства)
      description: Заголовок для устройств со статусом unavailable/unknown.
      default: "⚠️ <b>ВНИМАНИЕ: Устройства без связи (Unavailable/Unknown):</b>"
      selector:
        text:
    text_no_sensors:
      name: 📝 Сообщение об отсутствии сенсоров
      default: "Сенсоры батарей не найдены."
      selector:
        text:
    text_no_summary_data:
      name: 📝 Сообщение об отсутствии сводки
      default: "Нет данных о типах батарей для отчета."
      selector:
        text:
    title_short_replace_low:
      name: 📱 Заголовок (Краткий, Замена, Низкий)
      default: "🔋 Отчёт Батарея+: 🪫♻️ Заряд < "
      selector:
        text:
    title_short_replace_ok:
      name: 📱 Заголовок (Краткий, Замена, OK)
      default: "🔋 Отчёт Батарея+: Замена не требуется"
      selector:
        text:
    title_short_charge_low:
      name: 📱 Заголовок (Краткий, Зарядка, Низкий)
      default: "🔋 Отчёт Батарея+: 🪫🔌 Заряд < "
      selector:
        text:
    title_short_charge_ok:
      name: 📱 Заголовок (Краткий, Зарядка, OK)
      default: "🔋Отчёт Батарея+: Зарядка не требуется"
      selector:
        text:
    title_full_report:
      name: 📊 Заголовок (Полный отчет)
      default: "🔋 Полный отчет Батарея+ (Отсортирован по уровню):"
      selector:
        text:

variables:
  mobile_device_id: !input mobile_notify_target
  telegram_notify_entities: !input telegram_notify_target
  vk_notify_target: !input vk_notify_target
  max_notify_target: !input max_notify_target
  critical_threshold: !input critical_level
  excluded_entity_ids: !input excluded_sensors
  send_full_report: !input send_full_report_option
  full_report_days: !input full_report_days
  trigger_days: !input trigger_days
  # Text variables
  text_disposable_header: !input text_disposable_header
  text_disposable_action: !input text_disposable_action
  text_disposable_ok: !input text_disposable_ok
  text_rechargeable_header: !input text_rechargeable_header
  text_rechargeable_action: !input text_rechargeable_action
  text_rechargeable_ok: !input text_rechargeable_ok
  text_full_replace_label: !input text_full_replace_label
  text_full_charge_label: !input text_full_charge_label
  text_rechargeable_type: !input text_rechargeable_type
  text_unknown_type: !input text_unknown_type
  text_summary_header: !input text_summary_header
  text_grand_total: !input text_grand_total
  text_offline_header: !input text_offline_header
  text_no_sensors: !input text_no_sensors
  text_no_summary_data: !input text_no_summary_data
  title_short_replace_low: !input title_short_replace_low
  title_short_replace_ok: !input title_short_replace_ok
  title_short_charge_low: !input title_short_charge_low
  title_short_charge_ok: !input title_short_charge_ok
  title_full_report: !input title_full_report

  # --- Target logic ---
  target_chat_ids: >-
    {% set selected_entities_raw = telegram_notify_entities.entity_id | default([]) %}
    {% set selected_entities = [selected_entities_raw] | flatten %}
    {% set chat_id_strings = selected_entities | map('regex_replace', find='^.+_', replace='') | list %}
    {% set ns = namespace(target_ids=[]) %}
    {% for id_string in chat_id_strings %}
      {% set cleaned_id = id_string | string | trim %}
      {% if cleaned_id | length > 10 and not cleaned_id.startswith('-') %}
        {% set id_with_hyphen = '-' ~ cleaned_id %}
        {% set ns.target_ids = ns.target_ids + [id_with_hyphen] %}
      {% else %}
        {% set ns.target_ids = ns.target_ids + [cleaned_id] %}
      {% endif %}
    {% endfor %}
    {{ ns.target_ids }}

  vk_targets: >-
    {% set raw = vk_notify_target.entity_id | default([]) %}
    {{ [raw] | flatten | reject('==', '') | list }}

  max_targets: >-
    {% set raw = max_notify_target.entity_id | default([]) %}
    {{ [raw] | flatten | reject('==', '') | list }}

trigger:
  - platform: time
    at: !input trigger_time

action:
  # ----------------------------------------------------------------------
  # 1. РАССЧЕТ И ГЕНЕРАЦИЯ СООБЩЕНИЙ (КРАТКИЙ И ПОЛНЫЙ)
  # ----------------------------------------------------------------------
  - alias: Рассчитать отчеты
    variables:
      threshold: "{{ critical_threshold | int }}"
      exclude_list: "{{ excluded_entity_ids.entity_id | default([]) }}"

      # Сообщение о незаряжаемых батареях (Замена) - КРАТКИЙ ОТЧЕТ 1
      disposable_message: >-
        {% set ns = namespace(disposable_lines=[]) %}
        {% for sensor in states.sensor %}
          {% if sensor.attributes.battery_last_reported_level is defined and sensor.entity_id not in exclude_list %}
            {% set name = sensor.attributes.friendly_name | default(sensor.entity_id) %}
            {% set numerical_level = sensor.attributes.battery_last_reported_level | float(default=-1) | int(default=-1) %}
            {% if numerical_level >= 0 and numerical_level < threshold %}
              {% set battery_type = sensor.attributes.battery_type | default('Unknown') %}
              {% set cleaned_name = name | replace(' Батарея+', '') | trim %}
              {% set is_rechargeable = (battery_type == 'Rechargeable' or 'F946B' in cleaned_name or 'F966B' in cleaned_name or 'privod' in cleaned_name) %}
              {% if not is_rechargeable %}
                {% set battery_quantity = sensor.attributes.battery_quantity | default('1') | string %}
                {# Экранирование данных, которые будут вставлены в HTML #}
                {% set escaped_battery_type = battery_type | string | replace('<', '&lt;') | replace('>', '&gt;') %}
                {% set escaped_name = cleaned_name | string | replace('<', '&lt;') | replace('>', '&gt;') %}
                {% set escaped_quantity = battery_quantity | replace('<', '&lt;') | replace('>', '&gt;') %}

                {% set line_action = text_disposable_action | replace('%LEVEL%', numerical_level | string) | replace('%TYPE%', escaped_battery_type) | replace('%QTY%', escaped_quantity) %}
                {% set line = escaped_name ~ ": " ~ line_action %}
                {% set ns.disposable_lines = ns.disposable_lines + [{ 'level': numerical_level, 'line': line }] %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% set sorted_disposable = ns.disposable_lines | sort(attribute='level') %}
        {% set disposable_output = sorted_disposable | map(attribute='line') | list %}
        {% if disposable_output | length > 0 %}
          {{ text_disposable_header ~ disposable_output | join('\n') }}
        {% else %}
          {{ text_disposable_ok ~ critical_threshold ~ "%." }}
        {% endif %}

      # Сообщение о заряжаемых устройствах (Зарядка) - КРАТКИЙ ОТЧЕТ 2
      rechargeable_message: >-
        {% set ns = namespace(rechargeable_lines=[]) %}
        {% for sensor in states.sensor %}
          {% if sensor.attributes.battery_last_reported_level is defined and sensor.entity_id not in exclude_list %}
            {% set name = sensor.attributes.friendly_name | default(sensor.entity_id) %}
            {% set numerical_level = sensor.attributes.battery_last_reported_level | float(default=-1) | int(default=-1) %}
            {% if numerical_level >= 0 and numerical_level < threshold %}
              {% set battery_type = sensor.attributes.battery_type | default('Unknown') %}
              {% set cleaned_name = name | replace(' Батарея+', '') | trim %}
              {% set is_rechargeable = (battery_type == 'Rechargeable' or 'F946B' in cleaned_name or 'F966B' in cleaned_name or 'privod' in cleaned_name) %}
              {% if is_rechargeable %}
                {# Экранирование данных, которые будут вставлены в HTML #}
                {% set escaped_name = cleaned_name | string | replace('<', '&lt;') | replace('>', '&gt;') %}

                {% set line_action = text_rechargeable_action | replace('%LEVEL%', numerical_level | string) %}
                {% set line = escaped_name ~ ": " ~ line_action %}
                {% set ns.rechargeable_lines = ns.rechargeable_lines + [{ 'level': numerical_level, 'line': line }] %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% set sorted_rechargeable = ns.rechargeable_lines | sort(attribute='level') %}
        {% set rechargeable_output = sorted_rechargeable | map(attribute='line') | list %}
        {% if rechargeable_output | length > 0 %}
          {{ text_rechargeable_header ~ rechargeable_output | join('\n') }}
        {% else %}
          {{ text_rechargeable_ok ~ critical_threshold ~ "%." }}
        {% endif %}

      # ОТЧЕТ 3: ПОЛНЫЙ СПИСОК (Сортировка и цветовая индикация)
      full_report_body_list: >-
        {% set ns = namespace(all_lines=[]) %}
        {% set yellow_boundary = 40 %}
        {% set red_boundary = 15 %}

        {% for sensor in states.sensor %}
          {% if sensor.attributes.battery_last_reported_level is defined and sensor.entity_id not in exclude_list %}
            {% set name = sensor.attributes.friendly_name | default(sensor.entity_id) %}
            {% set numerical_level = sensor.attributes.battery_last_reported_level | float(default=-1) | int(default=-1) %}

            {% if numerical_level >= 0 %}
              {% set battery_type = sensor.attributes.battery_type | default('Unknown') %}
              {% set cleaned_name = name | replace(' Батарея+', '') | trim %}
              {% set is_rechargeable = (battery_type == 'Rechargeable' or 'F946B' in cleaned_name or 'F966B' in cleaned_name or 'privod' in cleaned_name) %}

              {% set status_icon = '🟢' %}
              {% if numerical_level < red_boundary %}
                {% set status_icon = '🔴' %}
              {% elif numerical_level < yellow_boundary %}
                {% set status_icon = '🟡' %}
              {% endif %}

              {% set status_label = '' %}
              {% if numerical_level < threshold %}
                {% set status_label = text_full_replace_label if not is_rechargeable else text_full_charge_label %}
              {% endif %}

              {% set details = "" %}
              {% if not is_rechargeable %}
                {% set battery_quantity = sensor.attributes.battery_quantity | default('1') | string %}
                {# Экранирование данных #}
                {% set escaped_battery_type = battery_type | string | replace('<', '&lt;') | replace('>', '&gt;') %}
                {% set escaped_quantity = battery_quantity | replace('<', '&lt;') | replace('>', '&gt;') %}
                {% set details = " (Тип: " ~ escaped_battery_type ~ ", Кол-во: " ~ escaped_quantity ~ " шт)" %}
              {% endif %}

              {# Экранирование имени устройства #}
              {% set escaped_name = cleaned_name | string | replace('<', '&lt;') | replace('>', '&gt;') %}

              {% set line = status_icon ~ " " ~ escaped_name ~ ": " ~ numerical_level ~ "%" ~ status_label ~ details %}
              {% set ns.all_lines = ns.all_lines + [{ 'level': numerical_level, 'line': line }] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% set sorted_all = ns.all_lines | sort(attribute='level', reverse=true) %}
        {% set all_output = sorted_all | map(attribute='line') | list %}

        {% if all_output | length > 0 %}
          {{ all_output | join('\n') }}
        {% else %}
          {{ text_no_sensors }}
        {% endif %}

      # ОТЧЕТ 4: СВОДКА ПО ТИПУ БАТАРЕИ
      battery_types_summary: >-
        {% set ns = namespace(output_lines=[]) %}
        {% set all_battery_sensors = states.sensor
            | selectattr('attributes.battery_last_reported_level', 'defined')
            | rejectattr('entity_id', 'in', exclude_list)
            | list %}

        {% set grouped_by_type = all_battery_sensors
            | groupby('attributes.battery_type') %}

        {% for type, sensors in grouped_by_type %}
          {% set total_quantity = namespace(value=0) %}
          {% for sensor in sensors %}
            {% set quantity = sensor.attributes.battery_quantity | default('1') | int(default=1) %}
            {% set total_quantity.value = total_quantity.value + quantity %}
          {% endfor %}

          {% set display_type = type | default(text_unknown_type) | string %}
          {% if display_type == 'Rechargeable' %}
            {% set display_type = text_rechargeable_type %}
          {% endif %}

          {# Экранирование имени типа батареи #}
          {% set escaped_display_type = display_type | replace('<', '&lt;') | replace('>', '&gt;') %}

          {% set line = "• " ~ escaped_display_type ~ " (Всего: " ~ total_quantity.value ~ " шт)" %}
          {% set ns.output_lines = ns.output_lines + [line] %}
        {% endfor %}

        {% if ns.output_lines | length > 0 %}
          {{ text_summary_header ~ ns.output_lines | sort | join('\n') }}
        {% else %}
          {{ text_no_summary_data }}
        {% endif %}

      # ОТЧЕТ 5: УСТРОЙСТВА ВНЕ СЕТИ (UNAVAILABLE / UNKNOWN)
      offline_sensors_report: >-
        {% set ns = namespace(offline_lines=[]) %}
        {% for sensor in states.sensor %}
          {% if sensor.attributes.battery_last_reported_level is defined and sensor.entity_id not in exclude_list %}
            {% if sensor.state in ['unavailable', 'unknown'] %}
              {% set name = sensor.attributes.friendly_name | default(sensor.entity_id) %}
              {% set cleaned_name = name | replace(' Батарея+', '') | trim %}
              {% set escaped_name = cleaned_name | string | replace('<', '&lt;') | replace('>', '&gt;') %}
              {% set line = "❓ " ~ escaped_name ~ " (Статус: " ~ sensor.state ~ ")" %}
              {% set ns.offline_lines = ns.offline_lines + [line] %}
            {% endif %}
          {% endif %}
        {% endfor %}

        {% if ns.offline_lines | length > 0 %}
          {{ text_offline_header ~ '\n' ~ ns.offline_lines | join('\n') }}
        {% endif %}

      # Глобальная переменная для общего кол-ва
      grand_total_quantity: >-
        {% set total = namespace(value=0) %}
        {% set exclude_list_local = excluded_entity_ids.entity_id | default([]) %}
        {% for sensor in states.sensor %}
          {% if sensor.attributes.battery_last_reported_level is defined and sensor.entity_id not in exclude_list_local %}
            {% set quantity = sensor.attributes.battery_quantity | default('1') | int(default=1) %}
            {% set total.value = total.value + quantity %}
          {% endif %}
        {% endfor %}
        {{ total.value }}

      # СБОРКА ТЕЛА ПОЛНОГО ОТЧЕТА (БЕЗ ЗАГОЛОВКА, ДЛЯ VK И MAX)
      full_report_body: >
        {% set total_text = text_grand_total | replace('%TOTAL%', grand_total_quantity | default(0) | string) %}
        {{ total_text ~ '\n\n' ~ full_report_body_list ~ '\n\n' ~ battery_types_summary ~ '\n\n' ~ offline_sensors_report }}


  # ----------------------------------------------------------------------
  # 2. ОТПРАВКА ОТЧЕТА 1: НЕЗАРЯЖАЕМЫЕ (ЗАМЕНА)
  # ----------------------------------------------------------------------
  - alias: Отправить Отчет 1 - Незаряжаемые (Условно)
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set selected_days = trigger_days %}
              {% if selected_days | length > 0 %}
                {{ now().strftime('%a') in selected_days }}
              {% else %}
                {{ true }}
              {% endif %}
        sequence:
          - parallel:
              # 2.1 Мобильное приложение
              - if: "{{ mobile_device_id is not none and mobile_device_id != '' }}"
                then:
                  - action: notify.mobile_app_{{ device_attr(mobile_device_id, 'name') | lower | replace(' ', '_') | replace('-', '_') }}
                    data:
                      title: >
                        {% if disposable_message.startswith('⚠️') %}
                          {{ title_short_replace_low | replace('<b>', '') | replace('</b>', '') ~ critical_threshold ~ "%" }}
                        {% else %}
                          {{ title_short_replace_ok | replace('<b>', '') | replace('</b>', '') }}
                        {% endif %}
                      message: "{{ disposable_message | replace('<b>', '') | replace('</b>', '') | replace('<i>', '') | replace('</i>', '') | replace('&lt;', '<') | replace('&gt;', '>') | replace('&amp;', '&') }}"
                    continue_on_error: true

              # 2.2 Telegram Bot (HTML)
              - if: "{{ target_chat_ids | length > 0 }}"
                then:
                  - action: telegram_bot.send_message
                    data:
                      chat_id: "{{ target_chat_ids }}"
                      message: |
                        {% if disposable_message.startswith('⚠️') %}
                          {% set header = '<b>' ~ title_short_replace_low | replace('<', '&lt;') ~ critical_threshold ~ '%</b>' %}
                        {% else %}
                          {% set header = '<b>' ~ title_short_replace_ok ~ '</b>' %}
                        {% endif %}
                        {{ header ~ "\n\n" ~ disposable_message }}
                      parse_mode: html
                    continue_on_error: true

              # 2.3 VK Notify (HTML)
              - if: "{{ vk_targets | length > 0 }}"
                then:
                  - action: vk_notify.send_message
                    target:
                      entity_id: "{{ vk_targets }}"
                    data:
                      title: >
                        {% if disposable_message.startswith('⚠️') %}
                          {{ title_short_replace_low | replace('<b>', '') | replace('</b>', '') ~ critical_threshold ~ "%" }}
                        {% else %}
                          {{ title_short_replace_ok | replace('<b>', '') | replace('</b>', '') }}
                        {% endif %}
                      message: "{{ disposable_message }}"
                      parse_mode: html
                      disable_mentions: true
                    continue_on_error: true

              # 2.4 Max Notify (HTML)
              - if: "{{ max_targets | length > 0 }}"
                then:
                  - action: max_notify.send_message
                    target:
                      entity_id: "{{ max_targets }}"
                    data:
                      title: >
                        {% if disposable_message.startswith('⚠️') %}
                          {{ title_short_replace_low | replace('<b>', '') | replace('</b>', '') ~ critical_threshold ~ "%" }}
                        {% else %}
                          {{ title_short_replace_ok | replace('<b>', '') | replace('</b>', '') }}
                        {% endif %}
                      message: "{{ disposable_message }}"
                      format: html
                    continue_on_error: true

  # ----------------------------------------------------------------------
  # 3. ОТПРАВКА ОТЧЕТА 2: ЗАРЯЖАЕМЫЕ (ЗАРЯДКА)
  # ----------------------------------------------------------------------
  - alias: Отправить Отчет 2 - Заряжаемые (Условно)
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set selected_days = trigger_days %}
              {% if selected_days | length > 0 %}
                {{ now().strftime('%a') in selected_days }}
              {% else %}
                {{ true }}
              {% endif %}
        sequence:
          - parallel:
              # 3.1 Мобильное приложение
              - if: "{{ mobile_device_id is not none and mobile_device_id != '' }}"
                then:
                  - action: notify.mobile_app_{{ device_attr(mobile_device_id, 'name') | lower | replace(' ', '_') | replace('-', '_') }}
                    data:
                      title: >
                        {% if rechargeable_message.startswith('⚠️') %}
                          {{ title_short_charge_low | replace('<b>', '') | replace('</b>', '') ~ critical_threshold ~ "%" }}
                        {% else %}
                          {{ title_short_charge_ok | replace('<b>', '') | replace('</b>', '') }}
                        {% endif %}
                      message: "{{ rechargeable_message | replace('<b>', '') | replace('</b>', '') | replace('<i>', '') | replace('</i>', '') | replace('&lt;', '<') | replace('&gt;', '>') | replace('&amp;', '&') }}"
                    continue_on_error: true

              # 3.2 Telegram Bot (HTML)
              - if: "{{ target_chat_ids | length > 0 }}"
                then:
                  - action: telegram_bot.send_message
                    data:
                      chat_id: "{{ target_chat_ids }}"
                      message: |
                        {% if rechargeable_message.startswith('⚠️') %}
                          {% set header = '<b>' ~ title_short_charge_low | replace('<', '&lt;') ~ critical_threshold ~ '%</b>' %}
                        {% else %}
                          {% set header = '<b>' ~ title_short_charge_ok ~ '</b>' %}
                        {% endif %}
                        {{ header ~ "\n\n" ~ rechargeable_message }}
                      parse_mode: html
                    continue_on_error: true

              # 3.3 VK Notify (HTML)
              - if: "{{ vk_targets | length > 0 }}"
                then:
                  - action: vk_notify.send_message
                    target:
                      entity_id: "{{ vk_targets }}"
                    data:
                      title: >
                        {% if rechargeable_message.startswith('⚠️') %}
                          {{ title_short_charge_low | replace('<b>', '') | replace('</b>', '') ~ critical_threshold ~ "%" }}
                        {% else %}
                          {{ title_short_charge_ok | replace('<b>', '') | replace('</b>', '') }}
                        {% endif %}
                      message: "{{ rechargeable_message }}"
                      parse_mode: html
                      disable_mentions: true
                    continue_on_error: true

              # 3.4 Max Notify (HTML)
              - if: "{{ max_targets | length > 0 }}"
                then:
                  - action: max_notify.send_message
                    target:
                      entity_id: "{{ max_targets }}"
                    data:
                      title: >
                        {% if rechargeable_message.startswith('⚠️') %}
                          {{ title_short_charge_low | replace('<b>', '') | replace('</b>', '') ~ critical_threshold ~ "%" }}
                        {% else %}
                          {{ title_short_charge_ok | replace('<b>', '') | replace('</b>', '') }}
                        {% endif %}
                      message: "{{ rechargeable_message }}"
                      format: html
                    continue_on_error: true

  # ----------------------------------------------------------------------
  # 4. ОТПРАВКА ОТЧЕТА 3: ПОЛНЫЙ СПИСОК (ОПЦИОНАЛЬНО)
  # ----------------------------------------------------------------------
  - alias: Отправить Полный отчет
    choose:
      - conditions:
          - condition: template
            value_template: "{{ send_full_report }}"
          - condition: template
            value_template: >
              {% set selected_days = full_report_days %}
              {% if selected_days | length > 0 %}
                {{ now().strftime('%a') in selected_days }}
              {% else %}
                {{ true }}
              {% endif %}
        sequence:
          - parallel:
              # 4.1 Полный отчет - Telegram
              - if: "{{ target_chat_ids | length > 0 }}"
                then:
                  - action: telegram_bot.send_message
                    data:
                      chat_id: "{{ target_chat_ids }}"
                      message: "<b>{{ title_full_report | replace('<b>', '') | replace('</b>', '') }}</b>\n\n{{ full_report_body }}"
                      parse_mode: html
                    continue_on_error: true

              # 4.2 Полный отчет - VK Notify
              - if: "{{ vk_targets | length > 0 }}"
                then:
                  - action: vk_notify.send_message
                    target:
                      entity_id: "{{ vk_targets }}"
                    data:
                      title: "{{ title_full_report | replace('<b>', '') | replace('</b>', '') }}"
                      message: "{{ full_report_body }}"
                      parse_mode: html
                      disable_mentions: true
                    continue_on_error: true

              # 4.3 Полный отчет - Max Notify (HTML)
              - if: "{{ max_targets | length > 0 }}"
                then:
                  - action: max_notify.send_message
                    target:
                      entity_id: "{{ max_targets }}"
                    data:
                      title: "{{ title_full_report | replace('<b>', '') | replace('</b>', '') }}"
                      message: "{{ full_report_body }}"
                      format: html
                    continue_on_error: true

mode: single
