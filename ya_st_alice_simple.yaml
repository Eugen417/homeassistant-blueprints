sequence:
  - variables:
      # Защита: гарантируем, что список колонок — это всегда список (list)
      stations: >-
        {% if target_station is string %}
          {{ [target_station] }}
        {% elif target_station is iterable %}
          {{ target_station | list }}
        {% else %}
          []
        {% endif %}
      
      safe_vol: "{{ volume_level | default(0.5) | float }}"
      safe_restore: "{{ restore_volume_level | default(0) | float }}"
      safe_delay_extra: "{{ extra_delay | default(5) | int }}"
      safe_method: "{{ method | default('play_media') }}"
      safe_prefix: "{{ prefix_sound | default('') }}"
      safe_voice: "{{ voice | default('') }}"
      safe_effect: "{{ effect | default('') }}"
      safe_whisper: "{{ is_whisper | default(false) | bool }}"
      
      # МАГИЯ: Собираем карту громкостей ДО изменения
      original_volumes: >-
        {% set ns = namespace(v={}) %}
        {% for s in stations %}
          {% set vol = state_attr(s, 'volume_level') | float(0.4) %}
          {% set ns.v = dict(ns.v, **{s: vol}) %}
        {% endfor %}
        {{ dict(ns.v) }}
      
      # Собираем строку с тегами для TTS
      compiled_message: |-
        {% set tags = [] %}
        {% if safe_prefix != "" %}
          {% set tags = tags + ['<speaker audio="' ~ safe_prefix ~ '">'] %}
        {% endif %}
        {% if safe_voice != "" %}
          {% set tags = tags + ['<speaker voice="' ~ safe_voice ~ '">'] %}
        {% endif %}
        {% if safe_effect != "" %}
          {% set tags = tags + ['<speaker effect="' ~ safe_effect ~ '">'] %}
        {% endif %}
        {% if safe_whisper %}
          {% set tags = tags + ['<speaker is_whisper="true">'] %}
        {% endif %}
        {{ tags | join(' ') }} {{ message }}

  # 1 & 2. Установка громкости (только если это не КОМАНДА и громкость > 0)
  - if:
      - condition: template
        value_template: "{{ safe_method != 'command' and safe_vol > 0 }}"
    then:
      - action: media_player.volume_set
        target:
          entity_id: "{{ stations }}"
        data:
          volume_level: "{{ safe_vol }}"
      - delay: "00:00:00.5"

  # 3. Отправляем фразу выбранным методом на ВСЕ колонки
  - choose:
      # Классический TTS
      - conditions:
          - condition: template
            value_template: "{{ safe_method == 'tts' }}"
        sequence:
          - action: tts.yandex_station_say
            target:
              entity_id: "{{ stations }}"
            data:
              message: "{{ compiled_message }}"
              cache: false
      
      # Исполнение команды (без тегов SSML!)
      - conditions:
          - condition: template
            value_template: "{{ safe_method == 'command' }}"
        sequence:
          - action: media_player.play_media
            target:
              entity_id: "{{ stations }}"
            data:
              media_content_id: "{{ message }}"
              media_content_type: command
              
    # По умолчанию - Произношение текста через Play Media (Надежный вариант)
    default:
      - action: media_player.play_media
        target:
          entity_id: "{{ stations }}"
        data:
          media_content_id: "{{ compiled_message }}"
          media_content_type: text

  # 4 & 5. Пауза и возврат громкости (только если это не КОМАНДА)
  - if:
      - condition: template
        value_template: "{{ safe_method != 'command' }}"
    then:
      - delay:
          seconds: "{{ (message | length * 0.13) | int + safe_delay_extra }}"
          
      - repeat:
          for_each: "{{ stations }}"
          sequence:
            - action: media_player.volume_set
              target:
                entity_id: "{{ repeat.item }}"
              data:
                # Безопасно достаем громкость колонки через .get(), чтобы избежать ошибок
                volume_level: "{{ safe_restore if safe_restore > 0 else original_volumes.get(repeat.item, 0.4) }}"
max: 10
