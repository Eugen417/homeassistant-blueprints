alias: "Алиса: Умный рупор Multi TTS+Play Media"
description: >
  v4.2 Cкрипт уведомлений. Мульти-выбор колонок с сохранением индивидуальной
  громкости,  база звуков, выбор метода отправки (tts / play_media) (Произнести текст / Выполнить команду).
  Полная база звуков, эффектов и поддержка пользовательских аудиофайлов. Cкрипт для
  Yandex.Station(Визуальный Интерфейс настройки TTS уведомлений для Яндекс
  станций)после его установки, в Автоматизациях выбирая этот скрипт в блоке:
  Тогда Появляется человеческий интерфейс настройки использующий под капотом:
  сервис tts.yandex_station_say. Сам скрипт настраивать не надо(это только
  Шаблон/Визуальный/Графический интерфейс для настройки TTS для Yandex.Station).
  Установка и настройка: Установка скрипта: Идем в Настройки > Автоматизации и
  сцены > Скрипты, создаём новый скрипт, далее переключаемся в текстовый
  редактор и заменяем/вставляем код скрипта как есть и сохраняемся. Готово!
  Настройка TTS автоматизаций: В автоматизации в блоке: Тогда выбираем Выполнить
  действие затем находим наш скрипт "Алиса: Умный рупор" откроется дружественный
  пользовательский интерфейс где надо будет выбрать Яндекс станцию, вписать
  текст уведомления и настроить/выбрать аудио эффекты и громкость.
icon: mdi:account-voice
mode: queued
fields:
  target_station:
    name: Колонка
    description: Выберите одну или несколько колонок (кликните в поле ниже)
    required: true
    selector:
      entity:
        domain: media_player
        integration: yandex_station
        multiple: true
  method:
    name: Режим работы
    description: "Выберите, что должна сделать колонка: просто сказать текст или выполнить его как команду (например, 'выключи свет')."
    default: "play_media"
    selector:
      select:
        options:
          - label: "🗣️ Произнести текст (Надежный)"
            value: "play_media"
          - label: "⚙️ Выполнить команду"
            value: "command"
          - label: "🎙️ Классический TTS"
            value: "tts"
  message:
    name: Сообщение
    description: Текст для озвучивания или текст команды
    required: true
    selector:
      text:
        multiline: true
  volume_level:
    name: Громкость уведомления
    description: Уровень громкости (0.1 - тихо, 1.0 - максимум). Оставьте 0 для текущей.
    required: true
    default: 0.5
    selector:
      number:
        min: 0
        max: 1
        step: 0.1
        mode: slider
  restore_volume_level:
    name: Громкость возврата
    description: Громкость после прочтения (0 - умно вернуть ту, что была у КАЖДОЙ колонки)
    required: true
    default: 0
    selector:
      number:
        min: 0
        max: 1
        step: 0.1
        mode: slider
  extra_delay:
    name: Дополнительная пауза (сек)
    description: Дополнительное время ожидания перед возвратом громкости (на случай длинных звуков)
    required: true
    default: 5
    selector:
      number:
        min: 0
        max: 60
        step: 1
        mode: slider
  voice:
    name: Голос
    description: Выбор персонажа (пусто = голос колонки по умолчанию)
    default: ""
    selector:
      select:
        options:
          - label: "Стандартный (Алиса)"
            value: ""
          - label: "Оксана"
            value: "oksana"
          - label: "Джейн"
            value: "jane"
          - label: "Омаж"
            value: "omazh"
          - label: "Захар"
            value: "zahar"
          - label: "Ермил"
            value: "ermil"
  effect:
    name: Эффект
    default: ""
