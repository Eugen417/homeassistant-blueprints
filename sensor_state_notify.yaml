blueprint:
  name: 📊 Периодический Отчет (ВСЕ классы) v1.1
  description: Создает отчет по ВСЕМ датчикам выбранного класса, используя максимально совместимую и очищенную логику Jinja. Включены все стандартные классы сенсоров. Заменен устаревший параметр target на chat_id.
  domain: automation
  source_url: https://raw.githubusercontent.com/Eugen417/homeassistant-blueprints/refs/heads/main/sensor_state_notify.yaml 

  input:
    report_interval_pattern:
      name: Интервал отчета (например, /5)
      description: Введите интервал в минутах в формате /N (например, /5 для каждых 5 минут).
      default: "/30" 
      selector:
        text:
          type: text
          
    target_device_class:
      name: Класс устройства для сканирования (device_class)
      description: Выберите класс устройств для отчета.
      default: temperature 
      selector:
        select:
          options:
            - label: Вес (weight)
              value: weight
            - label: Влажность (humidity)
              value: humidity
            - label: Вода (water)
              value: water
            - label: Газ (gas)
              value: gas
            - label: Давление (pressure)
              value: pressure
            - label: Заряд батареи (battery)
              value: battery
            - label: Индекс качества воздуха (AQI)
              value: aqi
            - label: Коэффициент мощности (power_factor)
              value: power_factor
            - label: ЛОС (Volatile Organic Compounds)
              value: volatile_organic_compounds
            - label: Мощность (power)
              value: power
            - label: Напряжение (voltage)
              value: voltage
            - label: Объем (volume)
              value: volume
            - label: Объем данных (data_size)
              value: data_size
            - label: Освещенность (illuminance)
              value: illuminance
            - label: Полная мощность (apparent_power)
              value: apparent_power
            - label: Продолжительность (duration)
              value: duration
            - label: Расстояние (distance)
              value: distance
            - label: Реактивная мощность (reactive_power)
              value: reactive_power
            - label: Сила сигнала (signal_strength)
              value: signal_strength
            - label: Скорость (speed)
              value: speed
            - label: Скорость ветра (wind_speed)
              value: wind_speed
            - label: Скорость передачи данных (data_rate)
              value: data_rate
            - label: Температура (temperature)
              value: temperature
            - label: Ток (current)
              value: current
            - label: Твердые частицы PM1 (pm1)
              value: pm1
            - label: Твердые частицы PM10 (pm10)
              value: pm10
            - label: Твердые частицы PM2.5 (pm25)
              value: pm25
            - label: Угарный газ (carbon_monoxide)
              value: carbon_monoxide
            - label: Углекислый газ (carbon_dioxide)
              value: carbon_dioxide
            - label: Финансы/Валюта (monetary)
              value: monetary
            - label: Частота (frequency)
              value: frequency
            - label: Энергия (energy)
              value: energy
          mode: dropdown
          
    exclude_sensors:
      name: Датчики для ИСКЛЮЧЕНИЯ из отчета
      description: Выберите датчики, которые НЕ должны попадать в отчет (необязательно).
      default:
        entity_id: []
      selector:
        target:
          entity:
            - domain: sensor
            
    telegram_notify_target:
      name: 💬 Целевые уведомления Telegram
      description: Выберите сущности вашего сервиса Telegram.
      default:
        entity_id: []
      selector:
        target:
          entity:
            - domain: notify

variables:
  target_class: !input target_device_class
  exclude_input: !input exclude_sensors
  telegram_target_input: !input telegram_notify_target
          
mode: single

trigger:
  - platform: time_pattern
    minutes: !input report_interval_pattern

action:
  - service: telegram_bot.send_message
    data:
      
      # 1. ЛОГИКА CHAT_ID
      chat_id: >-
        {% set target_input = telegram_target_input | default({}) %}
        {% set selected_entities_raw = target_input.entity_id | default([]) %}
        {% set selected_entities = [selected_entities_raw] | flatten %}
        {% set entity_ids_only = selected_entities | map('regex_replace', find='^notify\..+_', replace='') | list %}
        {% set ns = namespace(target_ids=[]) %}
        {% for id_string in entity_ids_only %}
          {% set cleaned_id = id_string | string | trim %}
          {% if cleaned_id | length > 10 and not cleaned_id.startswith('-') %}
            {% set id_with_hyphen = '-' ~ cleaned_id %}
            {% set ns.target_ids = ns.target_ids + [id_with_hyphen] %}
          {% else %}
            {% set ns.target_ids = ns.target_ids + [cleaned_id] %}
          {% endif %}
        {% endfor %}
        {{ ns.target_ids }}
        
      # 2. ТЕЛО СООБЩЕНИЯ (Модифицировано для включения и выделения недоступных статусов)
      message: |
        {% set class_labels = {
          'aqi': 'Индекс качества воздуха (AQI)',
          'apparent_power': 'Полная мощность',
          'battery': 'Заряд батареи',
          'carbon_dioxide': 'Углекислый газ',
          'carbon_monoxide': 'Угарный газ',
          'current': 'Ток',
          'data_rate': 'Скорость передачи данных',
          'data_size': 'Объем данных',
          'distance': 'Расстояние',
          'duration': 'Продолжительность',
          'energy': 'Энергия',
          'frequency': 'Частота',
          'gas': 'Газ',
          'humidity': 'Влажность',
          'illuminance': 'Освещенность',
          'monetary': 'Финансы/Валюта',
          'pm1': 'Твердые частицы PM1',
          'pm25': 'Твердые частицы PM2.5',
          'pm10': 'Твердые частицы PM10',
          'power': 'Мощность',
          'power_factor': 'Коэффициент мощности',
          'pressure': 'Давление',
          'reactive_power': 'Реактивная мощность',
          'signal_strength': 'Сила сигнала',
          'speed': 'Скорость',
          'temperature': 'Температура',
          'volatile_organic_compounds': 'ЛОС',
          'voltage': 'Напряжение',
          'volume': 'Объем',
          'water': 'Вода',
          'weight': 'Вес',
          'wind_speed': 'Скорость ветра'
        } %}
        {% set report_title = class_labels[target_class] | default(target_class) %}
        
        📊 <b>Периодический Отчет по {{ report_title }}</b>
        
        Текущие показания всех отслеживаемых датчиков (Класс: {{ report_title }})
        {% set excluded_ids = exclude_input.entity_id | default([]) | flatten %}
        {% set report_lines = namespace(output=[]) %}
        {%- for sensor in states.sensor
              | selectattr('attributes.device_class', 'eq', target_class)
              | sort(attribute='name') -%}
          {%- set sensor_is_excluded = sensor.entity_id in excluded_ids -%}
          {%- if sensor_is_excluded == false -%}
              {%- set name = sensor.name -%}
              {%- set state = sensor.state -%}
              {%- if state in ['unknown', 'unavailable', 'none', ''] -%}
                  {# Выделение статуса <b>жирным</b> шрифтом #}
                  {%- set formatted_value = "<b>(" ~ state ~ ")</b>" -%}
              {%- else -%}
                  {# Если состояние числовое, округляем и добавляем единицу измерения #}
                  {%- set unit = sensor.attributes.unit_of_measurement | default('N/A') -%}
                  {%- set formatted_value = state | round(2) ~ " " ~ unit -%}
              {%- endif -%}
              {%- set report_lines.output = report_lines.output + [ name ~ ": " ~ formatted_value ] -%}
          {%- endif -%}
        {%- endfor -%}
        
        {%- if report_lines.output | length > 0 -%}
        
        {{ report_lines.output | join('\n') }}
        
        {%- else -%}
        
        (Не удалось найти активные датчики с классом {{ report_title }}. Проверьте их наличие.)
        
        {%- endif -%}
        
      parse_mode: html
