name: Проверка Blueprints (Home Assistant)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'automation/**.yaml'
      - 'script/**.yaml'
      - '.github/workflows/ha-validate.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'automation/**.yaml'
      - 'script/**.yaml'
      - '.github/workflows/ha-validate.yml'

# Успокаиваем GitHub и переходим на новый Node.js
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  yamllint:
    name: 🧹 Проверка синтаксиса YAML
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Запуск yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              trailing-spaces: disable
              new-line-at-end-of-file: disable
              braces: disable
              brackets: disable
              comments: disable
              comments-indentation: disable

  ha-validation:
    name: 🏠 Валидация Home Assistant
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Подготовка тестовой среды HA
        run: |
          # Создаем изолированные папки под каждый тип блюпринтов
          mkdir -p fake_config/blueprints/automation/test
          mkdir -p fake_config/blueprints/script/test
          
          # Копируем только файлы из новых папок, игнорируя файлы в корне репозитория
          if [ -d "automation" ]; then
            find automation/ -type f -name "*.yaml" -exec cp {} fake_config/blueprints/automation/test/ \;
          fi
          
          if [ -d "script" ]; then
            find script/ -type f -name "*.yaml" -exec cp {} fake_config/blueprints/script/test/ \;
          fi
          
          echo "default_config:" > fake_config/configuration.yaml

      - name: Проверка конфигурации через HA CLI
        uses: frenck/action-home-assistant@v1
        continue-on-error: false
        with:
          path: "fake_config"
          version: "stable"

  integration-test:
    name: 🧪 Интеграционные тесты логики
    runs-on: ubuntu-latest
    needs: ha-validation # Запускаем только если синтаксис и базовая конфигурация в порядке
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-homeassistant-custom-component

      - name: Запуск pytest
        run: pytest tests/
