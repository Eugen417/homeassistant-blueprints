name: Проверка Blueprints (Home Assistant)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'automation/**.yaml'
      - 'script/**.yaml'
      - '.github/workflows/ha-validate.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'automation/**.yaml'
      - 'script/**.yaml'
      - '.github/workflows/ha-validate.yml'

# Успокаиваем GitHub и переходим на новый Node.js
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  yamllint:
    name: 🔍 Строгая проверка синтаксиса YAML
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Запуск yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              # В Home Assistant не принято начинать файлы с маркера ---
              document-start: disable
              
              # Отключаем лимит длины строки, так как в Home Assistant
              # шаблоны Jinja2 часто превышают 120 символов и это абсолютно нормально.
              line-length: disable
                
              # Жесткий контроль логических значений (разрешаем on/off для состояний HA)
              truthy:
                allowed-values: ['true', 'false', 'on', 'off']
                
              # Никакого мусора в коде
              trailing-spaces:
                level: error
              new-line-at-end-of-file:
                level: error
              new-lines:
                type: unix
                level: error
                
              # Идеальное форматирование комментариев (обязательный пробел после #)
              comments:
                level: error
              comments-indentation:
                level: error

  ha-validation:
    name: 🏠 Валидация Home Assistant
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Подготовка тестовой среды HA
        run: |
          # Создаем изолированные папки под каждый тип блюпринтов
          mkdir -p fake_config/blueprints/automation/test
          mkdir -p fake_config/blueprints/script/test
          
          # Копируем только файлы из новых папок, игнорируя файлы в корне репозитория
          if [ -d "automation" ]; then
            find automation/ -type f -name "*.yaml" -exec cp {} fake_config/blueprints/automation/test/ \;
          fi
          
          if [ -d "script" ]; then
            find script/ -type f -name "*.yaml" -exec cp {} fake_config/blueprints/script/test/ \;
          fi
          
          echo "default_config:" > fake_config/configuration.yaml

      - name: Проверка конфигурации через HA CLI
        uses: frenck/action-home-assistant@v1
        continue-on-error: false
        with:
          path: "fake_config"
          version: "stable"
