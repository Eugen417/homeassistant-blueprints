blueprint:
  name: Защита штор и жалюзи от повреждений (V2.1)
  description: >-
    Автоматизация для предотвращения коллизий между вертикальными жалюзи и шторами. 
    
    ВАЖНО: Убедитесь, что в настройках вашего шлюза (Zigbee2MQTT, ZHA и др.) для всех приводов:
    1. Включено отображение позиции в процентах (0-100%).
    2. Соблюден стандарт Home Assistant: 100% — ПОЛНОСТЬЮ ОТКРЫТО, 0% — ПОЛНОСТЬЮ ЗАКРЫТО.
    Если у вас 100% это закрыто — включите инверсию (Invert) в настройках устройства в Z2M.
    
    Принцип работы:
    1. При открытии штор — сначала открываются жалюзи (до >98%).
    2. При закрытии жалюзи — сначала закрываются шторы (до <2%).
  domain: automation
  source_url: https://raw.githubusercontent.com/Eugen417/homeassistant-blueprints/refs/heads/main/cover_collision_protect.yaml
  input:
    right_curtain_cover:
      name: Привод правой шторы
      selector:
        entity:
          domain: cover
          device_class: curtain
    left_curtain_cover:
      name: Привод левой шторы
      selector:
        entity:
          domain: cover
          device_class: curtain
    right_blinds_cover:
      name: Привод правых жалюзи
      selector:
        entity:
          domain: cover
          device_class: blind
    left_blinds_cover:
      name: Привод левых жалюзи
      selector:
        entity:
          domain: cover
          device_class: blind

trigger:
  - platform: state
    entity_id:
      - !input right_curtain_cover
      - !input left_curtain_cover
    to: opening
  - platform: state
    entity_id:
      - !input right_blinds_cover
      - !input left_blinds_cover
    to: closing

action:
  - variables:
      right_curtain: !input right_curtain_cover
      left_curtain: !input left_curtain_cover
      right_blinds: !input right_blinds_cover
      left_blinds: !input left_blinds_cover
  - choose:
      # --- ПРАВАЯ СТОРОНА: Открытие шторы ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == right_curtain }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(right_blinds, 'current_position') | int(-1) >= 99 }}"
                sequence:
                  - service: cover.open_cover
                    target:
                      entity_id: !input right_curtain_cover
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(right_blinds, 'current_position') | int(-1) < 99 }}"
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input right_curtain_cover
                  - service: cover.open_cover
                    target:
                      entity_id: !input right_blinds_cover
                  - wait_for_trigger:
                      - platform: numeric_state
                        entity_id: !input right_blinds_cover
                        attribute: current_position
                        above: 98
                  - service: cover.open_cover
                    target:
                      entity_id: !input right_curtain_cover

      # --- ЛЕВАЯ СТОРОНА: Открытие шторы ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == left_curtain }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(left_blinds, 'current_position') | int(-1) >= 99 }}"
                sequence:
                  - service: cover.open_cover
                    target:
                      entity_id: !input left_curtain_cover
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(left_blinds, 'current_position') | int(-1) < 99 }}"
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input left_curtain_cover
                  - service: cover.open_cover
                    target:
                      entity_id: !input left_blinds_cover
                  - wait_for_trigger:
                      - platform: numeric_state
                        entity_id: !input left_blinds_cover
                        attribute: current_position
                        above: 98
                  - service: cover.open_cover
                    target:
                      entity_id: !input left_curtain_cover

      # --- ПРАВАЯ СТОРОНА: Закрытие жалюзи ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == right_blinds }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(right_curtain, 'current_position') | int(-1) != -1 and state_attr(right_curtain, 'current_position') | int(-1) <= 1 }}"
                sequence:
                  - service: cover.close_cover
                    target:
                      entity_id: !input right_blinds_cover
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(right_curtain, 'current_position') | int(-1) > 1 or state_attr(right_curtain, 'current_position') == none }}"
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input right_blinds_cover
                  - service: cover.close_cover
                    target:
                      entity_id: !input right_curtain_cover
                  - wait_for_trigger:
                      - platform: numeric_state
                        entity_id: !input right_curtain_cover
                        attribute: current_position
                        below: 2
                  - service: cover.close_cover
                    target:
                      entity_id: !input right_blinds_cover

      # --- ЛЕВАЯ СТОРОНА: Закрытие жалюзи ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == left_blinds }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(left_curtain, 'current_position') | int(-1) != -1 and state_attr(left_curtain, 'current_position') | int(-1) <= 1 }}"
                sequence:
                  - service: cover.close_cover
                    target:
                      entity_id: !input left_blinds_cover
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(left_curtain, 'current_position') | int(-1) > 1 or state_attr(left_curtain, 'current_position') == none }}"
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input left_blinds_cover
                  - service: cover.close_cover
                    target:
                      entity_id: !input left_curtain_cover
                  - wait_for_trigger:
                      - platform: numeric_state
                        entity_id: !input left_curtain_cover
                        attribute: current_position
                        below: 2
                  - service: cover.close_cover
                    target:
                      entity_id: !input left_blinds_cover
mode: single
