blueprint:
  name: Защита штор и жалюзи от повреждений (V3.0)
  description: >-
    Автоматизация для предотвращения коллизий, использующая аппаратные сенсоры состояния моторов (motor_state или running) вместо процентов позиции. 
    Гарантирует, что следующий привод начнет движение только после полной физической остановки предыдущего.
  domain: automation
  source_url: "https://raw.githubusercontent.com/Eugen417/homeassistant-blueprints/main/automation/cover/cover_collision_protect.yaml"
  input:
    # --- ОСНОВНЫЕ ПРИВОДЫ ---
    right_curtain_cover:
      name: Привод правой шторы
      selector:
        entity:
          domain: cover
          device_class: curtain
    left_curtain_cover:
      name: Привод левой шторы
      selector:
        entity:
          domain: cover
          device_class: curtain
    right_blinds_cover:
      name: Привод правых жалюзи
      selector:
        entity:
          domain: cover
          device_class: blind
    left_blinds_cover:
      name: Привод левых жалюзи
      selector:
        entity:
          domain: cover
          device_class: blind
          
    # --- СЕНСОРЫ СОСТОЯНИЯ (motor_state или running) ---
    right_curtain_sensor:
      name: Сенсор работы ПРАВОЙ шторы
      description: Сенсор, показывающий движение (motor_state или running).
      selector:
        entity:
          domain:
            - sensor
            - binary_sensor
    left_curtain_sensor:
      name: Сенсор работы ЛЕВОЙ шторы
      description: Сенсор, показывающий движение (motor_state или running).
      selector:
        entity:
          domain:
            - sensor
            - binary_sensor
    right_blinds_sensor:
      name: Сенсор работы ПРАВЫХ жалюзи
      description: Сенсор, показывающий движение (motor_state или running).
      selector:
        entity:
          domain:
            - sensor
            - binary_sensor
    left_blinds_sensor:
      name: Сенсор работы ЛЕВЫХ жалюзи
      description: Сенсор, показывающий движение (motor_state или running).
      selector:
        entity:
          domain:
            - sensor
            - binary_sensor

    # --- НАСТРОЙКИ СТАТУСА ---
    stopped_state:
      name: Значение остановленного мотора
      description: >-
        Что передает сенсор, когда мотор стоит? 
        Если используете 'motor_state', напишите: stopped
        Если используете 'running', напишите: false (или off)
      default: "stopped"

mode: parallel
max: 10

trigger:
  - platform: state
    entity_id:
      - !input right_curtain_cover
      - !input left_curtain_cover
    to: opening
  - platform: state
    entity_id:
      - !input right_blinds_cover
      - !input left_blinds_cover
    to: closing

action:
  - variables:
      right_curtain: !input right_curtain_cover
      left_curtain: !input left_curtain_cover
      right_blinds: !input right_blinds_cover
      left_blinds: !input left_blinds_cover
      stop_state_val: !input stopped_state
  - choose:
      # ==========================================
      # --- ПРАВАЯ СТОРОНА: Открытие шторы ---
      # ==========================================
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == right_curtain }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(right_blinds, 'current_position') | int(-1) >= 99 }}"
                sequence:
                  - service: cover.open_cover
                    target:
                      entity_id: !input right_curtain_cover
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(right_blinds, 'current_position') | int(-1) < 99 }}"
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input right_curtain_cover
                  - service: cover.open_cover
                    target:
                      entity_id: !input right_blinds_cover
                  # Ждем аппаратной остановки мотора жалюзи
                  - wait_for_trigger:
                      - platform: state
                        entity_id: !input right_blinds_sensor
                        to: !input stopped_state
                    timeout: "00:00:20"
                    continue_on_timeout: true
                  - service: cover.open_cover
                    target:
                      entity_id: !input right_curtain_cover

      # ==========================================
      # --- ЛЕВАЯ СТОРОНА: Открытие шторы ---
      # ==========================================
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == left_curtain }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(left_blinds, 'current_position') | int(-1) >= 99 }}"
                sequence:
                  - service: cover.open_cover
                    target:
                      entity_id: !input left_curtain_cover
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr(left_blinds, 'current_position') | int(-1) < 99 }}"
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input left_curtain_cover
                  - service: cover.open_cover
                    target:
                      entity_id: !input left_blinds_cover
                  # Ждем аппаратной остановки мотора жалюзи
                  - wait_for_trigger:
                      - platform: state
                        entity_id: !input left_blinds_sensor
                        to: !input stopped_state
                    timeout: "00:00:20"
                    continue_on_timeout: true
                  - service: cover.open_cover
                    target:
                      entity_id: !input left_curtain_cover

      # ==========================================
      # --- ПРАВАЯ СТОРОНА: Закрытие жалюзи ---
      # ==========================================
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == right_blinds }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ state_attr(right_curtain, 'current_position') | int(-1) != -1 and 
                         state_attr(right_curtain, 'current_position') | int(-1) <= 1 }}
                sequence:
                  - service: cover.close_cover
                    target:
                      entity_id: !input right_blinds_cover
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ state_attr(right_curtain, 'current_position') | int(-1) > 1 or 
                         state_attr(right_curtain, 'current_position') == none }}
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input right_blinds_cover
                  - service: cover.close_cover
                    target:
                      entity_id: !input right_curtain_cover
                  # Ждем аппаратной остановки мотора шторы
                  - wait_for_trigger:
                      - platform: state
                        entity_id: !input right_curtain_sensor
                        to: !input stopped_state
                    timeout: "00:00:20"
                    continue_on_timeout: true
                  - service: cover.close_cover
                    target:
                      entity_id: !input right_blinds_cover

      # ==========================================
      # --- ЛЕВАЯ СТОРОНА: Закрытие жалюзи ---
      # ==========================================
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == left_blinds }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ state_attr(left_curtain, 'current_position') | int(-1) != -1 and 
                         state_attr(left_curtain, 'current_position') | int(-1) <= 1 }}
                sequence:
                  - service: cover.close_cover
                    target:
                      entity_id: !input left_blinds_cover
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ state_attr(left_curtain, 'current_position') | int(-1) > 1 or 
                         state_attr(left_curtain, 'current_position') == none }}
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input left_blinds_cover
                  - service: cover.close_cover
                    target:
                      entity_id: !input left_curtain_cover
                  # Ждем аппаратной остановки мотора шторы
                  - wait_for_trigger:
                      - platform: state
                        entity_id: !input left_curtain_sensor
                        to: !input stopped_state
                    timeout: "00:00:20"
                    continue_on_timeout: true
                  - service: cover.close_cover
                    target:
                      entity_id: !input left_blinds_cover
