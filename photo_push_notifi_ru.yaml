blueprint:
  name: Скриншот по движению + Telegram
  description: >
    При обнаружении движения делает скриншот и 
    отправляет его в указанный чат Telegram.
  domain: automation
  
  input:
    motion_sensor:
      name: Датчик движения
      selector:
        entity:
          domain: binary_sensor
          device_class:
            - motion
            - presence
            - occupancymotion
    target_camera:
      name: Камера
      selector:
        entity:
          domain: camera
    target_chat_id:
      name: ID чата Telegram (chat_id)
      description: "Укажите ваш ID в Telegram или ID группы (например: 123456789 или -123456789). Интеграция telegram_bot должна быть предварительно настроена."
      selector:
        text:

mode: single

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"

action:
  # ----------------------------------------------------------------
  # 1. ОБЪЯВЛЕНИЕ ПЕРЕМЕННЫХ
  # ----------------------------------------------------------------
  - variables:
      camera_entity: !input target_camera
      
      # Генерируем уникальное имя файла
      filename: "motion_{{ now().strftime('%Y%m%d_%H%M%S') }}"
      
      # Полный системный путь для сохранения картинки и отправки её в Telegram
      path_snap: "/config/www/snapshots/{{ filename }}.jpg"
      
      # Получаем красивое имя камеры для подписи
      camera_name: "{{ state_attr(camera_entity, 'friendly_name') or 'Камера' }}"

  # ----------------------------------------------------------------
  # 2. ДЕЙСТВИЯ
  # ----------------------------------------------------------------
  
  # Шаг 1: Делаем скриншот
  - action: camera.snapshot
    target:
      entity_id: !input target_camera
    data:
      filename: "{{ path_snap }}"

  # Шаг 2: Отправляем в Telegram
  - action: telegram_bot.send_photo
    data:
      chat_id: !input target_chat_id
      file: "{{ path_snap }}"
      caption: "Тревога: {{ camera_name }}\nДвижение зафиксировано!"
