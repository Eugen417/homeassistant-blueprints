name: Проверка Blueprints (Home Assistant)

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**.yaml'
      - '**.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - '**.yaml'
      - '**.yml'

jobs:
  yamllint:
    name: 🧹 Проверка синтаксиса YAML
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4
      
      - name: Запуск yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              trailing-spaces: disable
              new-line-at-end-of-file: disable
              braces: disable
              brackets: disable
              comments: disable
              comments-indentation: disable

  ha-validation:
    name: 🏠 Валидация Home Assistant
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Подготовка тестовой среды HA
        run: |
          mkdir -p fake_config/blueprints/automation/test
          find . -type f -name "*.yaml" -not -path "*/\.github/*" -exec cp {} fake_config/blueprints/automation/test/ \;
          echo "default_config:" > fake_config/configuration.yaml

      - name: Проверка конфигурации через HA CLI
        uses: frenck/action-homeassistant@v1
        with:
          path: "fake_config"
          version: "latest"
